<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ETI</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/profile.css" />
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="page-wrapper">
    <div class="container" style="padding-top:40px;padding-bottom:80px;">

      <!-- PAGE HEADER -->
      <div class="page-header mb-8">
        <div>
          <h1>My Profile</h1>
          <p class="text-muted mt-1">View and update your account information.</p>
        </div>
        <a href="./dashboard.html" class="btn btn-ghost">← Dashboard</a>
      </div>

      <div class="profile-layout" id="profile-layout">
        <!-- Loading state -->
        <div class="card" style="min-height:300px;display:grid;place-items:center;" id="profile-loading">
          <div style="text-align:center;">
            <span class="spinner spinner-dark" style="display:inline-block;"></span>
            <p class="text-muted mt-3 text-sm">Loading your profile…</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    mountLayout({ page: 'profile' });

    let currentUser = null;

    function renderProfile(user) {
      currentUser = user;
      const layout = document.getElementById('profile-layout');
      layout.innerHTML = `
        <!-- PROFILE SIDEBAR -->
        <div class="profile-sidebar">
          <div class="card prof-identity-card">
            <div class="prof-avatar-wrap">
              <div class="prof-avatar">${(user.username || 'U').charAt(0).toUpperCase()}</div>
              <div class="prof-avatar-ring"></div>
            </div>
            <div class="prof-name">${user.full_name || user.username}</div>
            <div class="prof-username text-muted">@${user.username}</div>
            <div class="mt-3">
              <span class="badge ${user.is_active ? 'badge-success' : 'badge-warning'}">
                ${user.is_active ? '✅ Active Account' : '⏳ Pending Activation'}
              </span>
            </div>
            <div class="prof-stats mt-4">
              <div class="prof-stat">
                <div class="prof-stat-val">${user.users_referred ?? 0}</div>
                <div class="prof-stat-lbl">Referrals</div>
              </div>
              <div class="prof-stat-divider"></div>
              <div class="prof-stat">
                <div class="prof-stat-val">${new Date(user.created_at).toLocaleDateString('en-NG', { month:'short', year:'numeric' })}</div>
                <div class="prof-stat-lbl">Member since</div>
              </div>
            </div>
            ${!user.is_active ? `
              <a href="./payments.html" class="btn btn-secondary btn-block mt-4">💳 Complete Payment</a>
            ` : ''}
          </div>

          <!-- READ-ONLY INFO -->
          <div class="card mt-4">
            <h4 style="margin-bottom:16px;font-size:.95rem;">Account Info</h4>
            <div class="info-row">
              <span class="info-key">Email</span>
              <span class="info-val">${user.email}</span>
            </div>
            ${user.phone ? `
            <div class="info-row">
              <span class="info-key">Phone</span>
              <span class="info-val">${user.phone}</span>
            </div>` : ''}
            ${user.school_name ? `
            <div class="info-row">
              <span class="info-key">School</span>
              <span class="info-val">${user.school_name}</span>
            </div>` : ''}
          </div>
        </div>

        <!-- EDIT FORM -->
        <div class="profile-main">
          <div class="card">
            <div class="card-head mb-6">
              <h3>Edit Profile</h3>
              <span class="badge badge-gray">Editable fields only</span>
            </div>

            <form id="profile-form" novalidate>
              <div class="form-group">
                <label class="form-label" for="pf-fullname">Full Name</label>
                <div class="input-wrapper">
                  <span class="input-icon">🪪</span>
                  <input type="text" id="pf-fullname" class="form-input" value="${user.full_name || ''}" placeholder="Your full name" />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="pf-school">School / Institution</label>
                <div class="input-wrapper">
                  <span class="input-icon">🏫</span>
                  <input type="text" id="pf-school" class="form-input" value="${user.school_name || ''}" placeholder="Your school name" />
                </div>
              </div>

              <div class="divider"></div>

              <h4 style="margin-bottom:16px;font-size:.95rem;">Change Password</h4>
              <p class="text-muted text-sm mb-4">Leave blank if you don't want to change your password.</p>

              <div class="form-group">
                <label class="form-label" for="pf-password">New Password</label>
                <div class="input-wrapper">
                  <span class="input-icon">🔒</span>
                  <input type="password" id="pf-password" class="form-input" placeholder="Leave blank to keep current" autocomplete="new-password" />
                  <button type="button" class="input-action" id="toggle-pf-pw">👁</button>
                </div>
                <span class="form-hint">At least 8 characters if changing.</span>
                <span class="form-error" id="pf-pw-error"></span>
              </div>

              <div class="form-group">
                <label class="form-label" for="pf-confirm">Confirm New Password</label>
                <div class="input-wrapper">
                  <span class="input-icon">🔒</span>
                  <input type="password" id="pf-confirm" class="form-input" placeholder="Repeat new password" autocomplete="new-password" />
                </div>
                <span class="form-error" id="pf-confirm-error"></span>
              </div>

              <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary" id="save-profile-btn">
                  💾 Save Changes
                </button>
                <button type="button" class="btn btn-ghost" id="reset-profile-btn">
                  Reset
                </button>
              </div>
            </form>
          </div>

          <!-- DANGER ZONE -->
          <div class="card danger-card mt-4">
            <div class="danger-header">
              <span>⚠️</span>
              <div>
                <h4>Account Actions</h4>
                <p class="text-muted text-sm">Manage your account session.</p>
              </div>
            </div>
            <button class="btn btn-ghost" id="logout-btn" style="border-color:var(--border);color:var(--text-muted);">
              🚪 Sign Out of All Sessions
            </button>
          </div>
        </div>
      `;

      // ---- TOGGLE PW ----
      document.getElementById('toggle-pf-pw')?.addEventListener('click', function() {
        const pw = document.getElementById('pf-password');
        pw.type = pw.type === 'text' ? 'password' : 'text';
        this.textContent = pw.type === 'text' ? '🙈' : '👁';
      });

      // ---- RESET ----
      document.getElementById('reset-profile-btn')?.addEventListener('click', () => {
        document.getElementById('pf-fullname').value = user.full_name || '';
        document.getElementById('pf-school').value = user.school_name || '';
        document.getElementById('pf-password').value = '';
        document.getElementById('pf-confirm').value = '';
        Toast.info('Reset', 'Form reset to saved values.');
      });

      // ---- LOGOUT ----
      document.getElementById('logout-btn')?.addEventListener('click', () => {
        AuthService.logout();
      });

      // ---- FORM SUBMIT ----
      document.getElementById('profile-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();

        const fullName = document.getElementById('pf-fullname').value.trim();
        const school = document.getElementById('pf-school').value.trim();
        const pw = document.getElementById('pf-password').value;
        const pwConfirm = document.getElementById('pf-confirm').value;

        // Validate password if provided
        if (pw) {
          if (pw.length < 8) {
            const err = document.getElementById('pf-pw-error');
            err.textContent = 'Password must be at least 8 characters.';
            err.classList.add('visible');
            return;
          }
          if (pw !== pwConfirm) {
            const err = document.getElementById('pf-confirm-error');
            err.textContent = 'Passwords do not match.';
            err.classList.add('visible');
            return;
          }
        }

        const payload = {};
        if (fullName !== (user.full_name || '')) payload.full_name = fullName;
        if (school !== (user.school_name || '')) payload.school_name = school;
        if (pw) payload.password = pw;

        if (!Object.keys(payload).length) {
          Toast.info('Nothing to update', 'No changes detected.');
          return;
        }

        const btn = document.getElementById('save-profile-btn');
        setButtonLoading(btn, true);

        try {
          const data = await AuthService.updateProfile(payload);
          AuthService.saveSession(data.user);
          Toast.success('Profile updated!', 'Your changes have been saved.');
          // Re-render with updated data
          document.getElementById('pf-password').value = '';
          document.getElementById('pf-confirm').value = '';
          currentUser = data.user;
        } catch (err) {
          Toast.error('Update failed', err.message || 'Could not save changes.');
        } finally {
          setButtonLoading(btn, false);
        }
      });
    }

    async function loadProfile() {
      try {
        const data = await AuthService.getMe();
        renderProfile(data.user);
      } catch (err) {
        document.getElementById('profile-layout').innerHTML = `
          <div class="empty-state card">
            <div class="empty-icon">😕</div>
            <h3>Failed to load profile</h3>
            <p>${err.message || 'Something went wrong.'}</p>
            <button class="btn btn-outline mt-4" onclick="loadProfile()">Retry</button>
          </div>`;
        Toast.error('Error', 'Could not load profile data.');
      }
    }

    loadProfile();
  </script>
</body>
</html>
